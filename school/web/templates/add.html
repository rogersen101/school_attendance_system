<!doctype html>
<html>
  <head>
    <title>Add Student</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>

  <body>
    <!-- nav bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
      <div class="container">
    
        <a class="navbar-brand d-flex align-items-center" href="/">
          <img
            src="https://images.seeklogo.com/logo-png/55/1/kyambogo-college-school-logo-png_seeklogo-556240.png"
            width="40"
            height="40"
            class="me-2"
            alt="logo"
          />
          <strong>Kyambogo College School</strong>
        </a>

        <button class="navbar-toggler" type="button"data-bs-toggle="collapse"data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- nav links -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/add">Add Student</a>
            </li>               
          </ul>

       </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h3>Add Attendance Record</h3>

      <form method="POST" action="/add">
        {% csrf_token %}

        <input
          name="name"
          class="form-control mb-2"
          placeholder="Student Name"
          required
        />

        <input
          name="student_id"
          class="form-control mb-2"
          placeholder="Student ID"
          required
        />

        <label> <input type="checkbox" name="is_present" /> Present </label>

        <br /><br />

        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>
  </body>
</html>
